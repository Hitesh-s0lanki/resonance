      <stop offset="0.55" stop-color="#544DF4"/>
      <stop offset="1" stop-color="#04AEEA"/>
    </linearGradient>
    <filter id="softShadow" x="120" y="160" width="790" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#2743B8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
