<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI voice app logo">
  <defs>
    <linearGradient id="bubbleGradient" x1="204" y1="784" x2="836" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061B9F"/>
      <stop offset="0.34" stop-color="#1057FF"/>
      <stop offset="0.66" stop-color="#08BCEB"/>
      <stop offset="1" stop-color="#BA2DF4"/>
    </linearGradient>
    <linearGradient id="faceGradient" x1="578" y1="270" x2="836" y2="774" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06BEEA"/>
      <stop offset="0.55" stop-color="#00A6F2"/>
      <stop offset="1" stop-color="#095EE9"/>
    </linearGradient>
    <linearGradient id="waveGradient" x1="330" y1="654" x2="652" y2="316" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#006AF2"/>
      <stop offset="0.46" stop-color="#8238F5"/>
      <stop offset="0.7" stop-color="#DB31FF"/>
      <stop offset="1" stop-color="#057FFF"/>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="654" y1="244" x2="842" y2="492" gradientUnits="userSpaceOnUse">
